services:
  postgres:
    container_name: postgres-student_lms
    image: postgres:18.3-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres:/var/lib/postgresql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=student_lms
      - TZ=UTC
    healthcheck:
      interval: 3s
      retries: 3
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      timeout: 10s
    configs:
      - source: postgres_init
        target: /docker-entrypoint-initdb.d/init.sql
    security_opt:
      - no-new-privileges:true

  seaweedfs-master:
    image: chrislusf/seaweedfs:4.21
    restart: unless-stopped
    ports:
      - "127.0.0.1:9333:9333"
    volumes:
      - seaweedfs_master_data:/data
    command: "master -ip=seaweedfs-master -port=9333 -mdir=/data"
    security_opt:
      - no-new-privileges:true

  seaweedfs-volume:
    image: chrislusf/seaweedfs:4.21
    restart: unless-stopped
    depends_on:
      - seaweedfs-master
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - seaweedfs_volume_data:/data
    command: "volume -mserver=seaweedfs-master:9333 -ip=seaweedfs-volume -port=8080 -dir=/data"
    security_opt:
      - no-new-privileges:true

  seaweedfs-filer:
    image: chrislusf/seaweedfs:4.21
    restart: unless-stopped
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume
    ports:
      - "127.0.0.1:8888:8888"
      - "127.0.0.1:8333:8333"
    volumes:
      - seaweedfs_filer_data:/data
    command: "filer -master=seaweedfs-master:9333 -ip=seaweedfs-filer -port=8888 -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json"
    configs:
      - source: seaweedfs_s3_config
        target: /etc/seaweedfs/s3.json
    security_opt:
      - no-new-privileges:true

  valkey:
    image: valkey/valkey:9.0.3-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    security_opt:
      - no-new-privileges:true

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8025:8025"
      - "127.0.0.1:1025:1025"
    security_opt:
      - no-new-privileges:true

  directus:
    image: directus/directus:11.17.3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs-filer:
        condition: service_started
      valkey:
        condition: service_started
    ports:
      - "127.0.0.1:8055:8055"
    volumes:
      - ./directus-schema.yaml:/directus/directus-schema.yaml
    environment:
      - SECRET=secure-secret-placeholder
      - KEY=secure-key-placeholder
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=adminpassword
      - DB_CLIENT=pg
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=student_lms
      - DB_USER=directus
      - DB_PASSWORD=directus
      - DB_SCHEMA=directus
      - DB_SEARCH_PATH=directus,public
      - STORAGE_LOCATIONS=s3
      - STORAGE_S3_DRIVER=s3
      - STORAGE_S3_KEY=admin
      - STORAGE_S3_SECRET=admin
      - STORAGE_S3_BUCKET=directus
      - STORAGE_S3_ENDPOINT=http://seaweedfs-filer:8333
      - STORAGE_S3_REGION=us-east-1
      - STORAGE_S3_FORCE_PATH_STYLE=true
      - CACHE_ENABLED=true
      - CACHE_STORE=redis
      - REDIS=redis://valkey:6379
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres:
  seaweedfs_master_data:
  seaweedfs_volume_data:
  seaweedfs_filer_data:

configs:
  postgres_init:
    content: |
      CREATE USER directus WITH PASSWORD 'directus';

      CREATE SCHEMA IF NOT EXISTS directus AUTHORIZATION directus;

      GRANT USAGE ON SCHEMA public TO directus;

      GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO directus;
      GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO directus;

      ALTER DEFAULT PRIVILEGES IN SCHEMA public 
      GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO directus;

      ALTER DEFAULT PRIVILEGES IN SCHEMA public 
      GRANT USAGE, SELECT ON SEQUENCES TO directus;

  seaweedfs_s3_config:
    content: |
      {
        "identities": [
          {
            "name": "admin",
            "credentials": [
              {
                "accessKey": "admin",
                "secretKey": "admin"
              }
            ],
            "actions": [
              "Read",
              "Write",
              "List",
              "Tagging",
              "Admin"
            ]
          }
        ]
      }
